# Fly.io — backend Stanny's
# Déployer depuis le dossier backend : cd backend && fly deploy

app = "stannys-backend"

[build]

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
